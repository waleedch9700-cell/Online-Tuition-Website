<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - eLEARNING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f0fbfc;">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h2 class="fw-bold mb-0">Create Account</h2>
                        <p class="mb-0">Join the eLEARNING Community</p>
                    </div>
                    <div class="card-body p-5">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fa fa-user text-primary"></i></span>
                                    <input type="text" class="form-control" placeholder="Enter your name">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fa fa-envelope text-primary"></i></span>
                                    <input type="email" class="form-control" placeholder="Email@example.com">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Select Role</label>
                                <select class="form-select">
                                    <option selected>I am a Student</option>
                                    <option>I am a Tutor</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fa fa-lock text-primary"></i></span>
                                    <input type="password" class="form-control" placeholder="Min 8 characters">
                                </div>
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="terms">
                                <label class="form-check-label small" for="terms">I agree to the Terms & Conditions</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold text-white shadow">SIGN UP NOW</button>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3 bg-white">
                        <p class="mb-0">Already have an account? <a href="#" class="text-primary fw-bold">Login Here</a></p>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted text-decoration-none"><i class="fa fa-arrow-left me-2"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault(); // Page ko refresh hone se rokne ke liye
            
            // Success Message
            alert("Thank you very much! Your registration at the University of Kotli Learning has been completed..");
            
            // Wapas Home Page par bhejne ke liye
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html></html>
